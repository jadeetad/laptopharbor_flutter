name: laptopharbor
description: LaptopHarbor - Premium Laptop Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  go_router: ^14.0.0
  provider: ^6.1.2
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  visibility_detector: ^0.4.0+2
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
